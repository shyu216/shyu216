<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="60" height="30">
  <!-- Main character group - centered -->
  <g id="coding-character">
    <!-- Computer Screen -->
    <defs>
      <filter id="screenGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <rect x="18" y="0" width="20" height="14" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#screenGlow)"/>
    <!-- Screen inner -->
    <rect x="19.5" y="1" width="17" height="11" rx="1" fill="#0d1117"/>
    <!-- Code lines container -->
    <g clip-path="url(#screenClipCode)">
      <defs>
        <clipPath id="screenClipCode">
          <rect x="20" y="1.5" width="16" height="10" rx="0.5"/>
        </clipPath>
      </defs>
        <line x1="21" y1="4.0" x2="22" y2="4.0" stroke="#7ee787" stroke-width="1.2">
          <animate attributeName="x2" values="22; 28; 22" dur="0.6s" begin="0.0s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7; 1; 0.7" dur="0.6s" begin="0.0s" repeatCount="indefinite"/>
        </line>
        <line x1="21" y1="6.5" x2="24" y2="6.5" stroke="#ffa657" stroke-width="1.2">
          <animate attributeName="x2" values="24; 30; 24" dur="0.7s" begin="0.08s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7; 1; 0.7" dur="0.7s" begin="0.08s" repeatCount="indefinite"/>
        </line>
        <line x1="21" y1="9.0" x2="26" y2="9.0" stroke="#d2a8ff" stroke-width="1.2">
          <animate attributeName="x2" values="26; 32; 26" dur="0.8s" begin="0.16s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7; 1; 0.7" dur="0.8s" begin="0.16s" repeatCount="indefinite"/>
        </line>
        <line x1="21" y1="11.5" x2="28" y2="11.5" stroke="#79c0ff" stroke-width="1.2">
          <animate attributeName="x2" values="28; 34; 28" dur="0.9s" begin="0.24s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7; 1; 0.7" dur="0.9s" begin="0.24s" repeatCount="indefinite"/>
        </line>
    </g>
    <!-- Screen reflection -->
    <path d="M 19.5 1 L 25 1 L 22 12 L 19.5 12 Z" fill="#f0f6fc" opacity="0.03"/>

    <!-- Flying code particles -->
    <g opacity="0">
      <text x="38" y="6" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">&amp;</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.5514598818961687s" begin="5.226538479337117s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -2" dur="1.5514598818961687s" begin="5.226538479337117s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="9" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">catch</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.363332039123938s" begin="5.594112794068166s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 2" dur="1.363332039123938s" begin="5.594112794068166s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="12" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">:=</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.0062067269914805s" begin="5.717187945478212s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 6" dur="2.0062067269914805s" begin="5.717187945478212s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="15" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">@</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.8402498528304418s" begin="4.9613957123491605s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 -2" dur="1.8402498528304418s" begin="4.9613957123491605s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="8" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">||</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.0108655347254847s" begin="9.138758357325994s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 2" dur="2.0108655347254847s" begin="9.138758357325994s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="11" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">&lt;&gt;</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.9949211356369696s" begin="10.790746303398873s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6" dur="1.9949211356369696s" begin="10.790746303398873s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="14" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">yield</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.8284697173963538s" begin="7.102165836670644s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -2" dur="1.8284697173963538s" begin="7.102165836670644s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="7" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">*</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.384722832592746s" begin="9.542233359770588s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 2" dur="2.384722832592746s" begin="9.542233359770588s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="10" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">void</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.0991208011190507s" begin="6.915193667265712s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 6" dur="2.0991208011190507s" begin="6.915193667265712s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="13" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">::</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.2166258540368924s" begin="1.413966761637682s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 -2" dur="2.2166258540368924s" begin="1.413966761637682s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="6" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">int</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.4882712030734069s" begin="3.4613637203076086s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 2" dur="1.4882712030734069s" begin="3.4613637203076086s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="9" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">[]</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.3473822618867213s" begin="6.094254228969143s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6" dur="2.3473822618867213s" begin="6.094254228969143s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="12" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">async</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.4260749881023225s" begin="4.4978227664887775s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -2" dur="1.4260749881023225s" begin="4.4978227664887775s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="15" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">&lt;/&gt;</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.4357848497038552s" begin="7.647500431440601s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 2" dur="2.4357848497038552s" begin="7.647500431440601s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="8" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">let</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.037738106378377s" begin="5.338857435353268s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 6" dur="2.037738106378377s" begin="5.338857435353268s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="11" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">!</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.9898145012796724s" begin="6.904181933608869s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 -2" dur="1.9898145012796724s" begin="6.904181933608869s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="14" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">fn</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.9277583829356848s" begin="6.967650020918687s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 2" dur="1.9277583829356848s" begin="6.967650020918687s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="7" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">func</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.5095431802954602s" begin="6.110671141041454s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6" dur="1.5095431802954602s" begin="6.110671141041454s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="10" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">new</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.0855920227904825s" begin="8.883997626590773s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -2" dur="2.0855920227904825s" begin="8.883997626590773s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="13" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">=&gt;</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.2305737220211177s" begin="0.0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 2" dur="1.2305737220211177s" begin="0.0s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="6" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">&lt;&lt;</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.9472982755260448s" begin="10.743782518969216s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 6" dur="1.9472982755260448s" begin="10.743782518969216s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="9" fill="#7ee787" font-size="2.5" font-family="monospace" font-weight="bold">()</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.6185493226602536s" begin="0.8787744895484799s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 -2" dur="1.6185493226602536s" begin="0.8787744895484799s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="12" fill="#ffa657" font-size="2.5" font-family="monospace" font-weight="bold">const</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="1.8048443592249823s" begin="0.25206338465016653s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 2" dur="1.8048443592249823s" begin="0.25206338465016653s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="16" y="15" fill="#d2a8ff" font-size="2.5" font-family="monospace" font-weight="bold">{}</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.2738801786209963s" begin="3.6615626301547097s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6" dur="2.2738801786209963s" begin="3.6615626301547097s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="38" y="8" fill="#58a6ff" font-size="2.5" font-family="monospace" font-weight="bold">try</text>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="2.4807734444162497s" begin="6.192589176061383s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -2" dur="2.4807734444162497s" begin="6.192589176061383s" repeatCount="indefinite"/>
    </g>

    <!-- Brain waves -->


    <!-- Face -->
    <!-- Face - warm skin tone -->
    <circle cx="28" cy="18" r="6" fill="#ffdbac"/>
    <!-- Simple eyes -->
    <circle cx="25.5" cy="17" r="1.2" fill="#333"/>
    <circle cx="30.5" cy="17" r="1.2" fill="#333"/>
    <!-- Eye shine - swinging in lower half of pupils -->
    <g>
      <circle cx="25.8" cy="16.7" r="0.4" fill="#fff" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="30 25.5 17; 150 25.5 17; 30 25.5 17" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
    </g>
    <g>
      <circle cx="30.8" cy="16.7" r="0.4" fill="#fff" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="30 30.5 17; 150 30.5 17; 30 30.5 17" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
    </g>
    <!-- Animated mouth: smile -> dot -> circle(O) -> dot -> smile -->
    <g>
      <!-- Mouth shape (curve or circle) -->
      <path stroke="#a0452e" stroke-width="0.8" fill="none" stroke-linecap="round">
        <!-- 核心路径动画：微笑→缩点→小圆→大圆→小圆→缩点→微笑 -->
        <animate attributeName="d"
          values="
            M 25 20.5 Q 28 23, 31 20.5;
            M 28 21.5 Q 28 21.5, 28 21.5;
            M 28 21 A 0.5 0.5 0 1 1 28 22 A 0.5 0.5 0 1 1 28 21;
            M 28 20.5 A 1 1 0 1 1 28 22.5 A 1 1 0 1 1 28 20.5;
            M 28 21 A 0.5 0.5 0 1 1 28 22 A 0.5 0.5 0 1 1 28 21;
            M 28 21.5 Q 28 21.5, 28 21.5;
            M 25 20.5 Q 28 23, 31 20.5"
          dur="6s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.45;0.45;0.5;0.6;0.6;1"
          keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>

        <!-- 填充动画：微笑时脸部肤色填充（凹陷效果），变圆时暖棕色实心（嘴巴内部） -->
        <animate attributeName="fill"
          values="#ffdbac;#ffdbac;#a0452e;#a0452e;#a0452e;#ffdbac;#ffdbac"
          dur="6s"
          repeatCount="indefinite"
          keyTimes="0;0.45;0.45;0.5;0.6;0.6;1"/>

        <!-- 描边动画：微笑时有暖棕色描边，变圆时隐藏描边 -->
        <animate attributeName="stroke"
          values="#a0452e;#a0452e;none;none;none;#a0452e;#a0452e"
          dur="6s"
          repeatCount="indefinite"
          keyTimes="0;0.45;0.45;0.5;0.6;0.6;1"/>
      </path>
    </g>

    <!-- Body -->


    <!-- Keyboard -->
    <!-- Keyboard in front of person -->
    <g transform="translate(15, 26)">
      <!-- Keyboard base -->
      <rect x="0" y="0" width="26" height="4" rx="1" fill="#30363d" stroke="#484f58" stroke-width="0.5"/>
      <!-- Space bar (现在在上方) -->
      <rect x="6" y="0.8" width="10" height="1.2" rx="0.3" fill="#21262d"/>
      <!-- Keys (现在在下方) -->
      <rect x="1.5" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="4" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="6.5" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="9" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="11.5" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="14" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="16.5" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="19" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <rect x="21.5" y="2.5" width="2" height="1.2" rx="0.3" fill="#21262d"/>
      <!-- Key press glow -->
      <ellipse cx="13" cy="2" rx="10" ry="1.5" fill="#58a6ff" opacity="0">
        <animate attributeName="opacity" values="0; 0.2; 0" dur="0.15s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Hands typing -->
    <!-- Left hand typing -->
    <g>
      <line x1="22" y1="22" x2="18" y2="25" stroke="#f4a460" stroke-width="2" stroke-linecap="round">
        <animate attributeName="y2" values="25; 23; 25" dur="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="x2" values="18; 17; 18" dur="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </line>
      <circle cx="17" cy="26" r="2" fill="#ffdbac">
        <animate attributeName="cy" values="26; 24; 26" dur="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="cx" values="17; 16; 17" dur="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
    </g>
    <!-- Right hand typing -->
    <g>
      <line x1="34" y1="22" x2="38" y2="25" stroke="#f4a460" stroke-width="2" stroke-linecap="round">
        <animate attributeName="y2" values="25; 23; 25" dur="0.2s" begin="0.05s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="x2" values="38; 39; 38" dur="0.2s" begin="0.05s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </line>
      <circle cx="39" cy="26" r="2" fill="#ffdbac">
        <animate attributeName="cy" values="26; 24; 26" dur="0.2s" begin="0.05s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="cx" values="39; 40; 39" dur="0.2s" begin="0.05s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
    </g>

    <!-- Coffee -->
    <!-- Coffee cup with steam -->
    <g transform="translate(45, 24)">
      <rect x="0" y="0" width="4" height="5" rx="0.8" fill="#ffa657" opacity="0.9"/>
      <path d="M 4 1 Q 5.5 1, 5.5 2.5 Q 5.5 4.5, 4 4.25" stroke="#ffa657" stroke-width="0.8" fill="none" opacity="0.9"/>
      <g opacity="0">
        <circle cx="1" cy="-0.5" r="0.6" fill="#8b949e" opacity="0.5"/>
        <animate attributeName="opacity" values="0; 0.5; 0" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0.5 -3" dur="2s" repeatCount="indefinite"/>
      </g>
      <g opacity="0">
        <circle cx="2.5" cy="-1" r="0.5" fill="#8b949e" opacity="0.4"/>
        <animate attributeName="opacity" values="0; 0.4; 0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; -0.3 -3.5" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
</svg>