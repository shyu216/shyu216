# 地图配置
map_config:
  width: 600
  height: 400
  # 投影方式: "mercator" 或 "azimuthal"
  projection: "azimuthal"
  # 中心点: "weighted", "centroid", "bbox", "melbourne", 或 [lon, lat]
  center: "weighted"
  scale: 150
  # 圆角弧度 (0-50, 0为直角)
  border_radius: 20
  colors:
    background: "#f5f5dc"
    land: "#d4c4a8"
    border: "#8b4513"
    graticule: "#8b7355"
    path_colors: ["#8b4513", "#a0522d", "#cd853f"]
