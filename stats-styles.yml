langColors:
  Python: "#FF85A2"
  C#: "#7DD3FC"
  TypeScript: "#FCD34D"
  C: "#B088F9"
  Perl: "#FF9EBB"
  JavaScript: "#FBBF24"
  HTML: "#FB923C"
  CSS: "#A78BFA"
  Java: "#34D399"
  "C++": "#F472B6"
  Go: "#22D3EE"
  Rust: "#FB923C"

fonts:
  primary: "'Nunito', 'Quicksand', 'Comic Sans MS', cursive"
  title: "'Fredoka One', 'Comic Sans MS', cursive"
  display: "'Fredoka One', 'Bubblegum Sans', cursive"
  round: "'Varela Round', 'Nunito', sans-serif"

topLanguages:
  - "Python"
  - "TypeScript"
  - "C#"
  - "C"
  - "Go"

editorColors:
  - "#FF85A2"
  - "#7DD3FC"
  - "#FCD34D"
  - "#B088F9"
  - "#FF9EBB"
  - "#6EE7B7"

borderRadius: 20

canvas:
  width: 600
  height: 200
