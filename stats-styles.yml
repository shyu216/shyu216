# Cute Pop Theme - 可爱波普风格
# 粉嫩圆润的可爱卡片

name: "Cute Pop"
description: "可爱波普风格 - 圆润甜美"

colors:
  background:
    start: "#FFE5F1"
    end: "#E8F9FF"

  text:
    primary: "#5D4E6D"
    secondary: "#8B7BA8"
    muted: "#B8A9C9"

  accent:
    main: "#FF85A2"
    secondary: "#7DD3FC"
    tertiary: "#FCD34D"
    light: "#FFB5C5"
    pink: "#FF9EBB"
    purple: "#B088F9"
    mint: "#6EE7B7"

  card:
    bg: "#FFFFFF"
    border: "#F0D9E8"

  progress:
    bg: "#F3E8FF"
